<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Maquette — disposition horizontale (abandonnée)</title>
<style>
  body { background:#f5f5f3; font-family: sans-serif; padding:2rem; display:flex; justify-content:center; }
  .telephone { width:320px; background:#FBF4E8; border-radius:18px; overflow:hidden; border:1px solid #e0ddd5; }
  .entete { text-align:center; padding:1.5rem 1rem 1rem; border-bottom:1px solid #E7DCC8; }
  .date { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#8C2F39; font-weight:500; margin:0 0 6px; }
  .titre80 { font-size:46px; font-weight:500; color:#2B1B17; line-height:0.9; margin:0; }
  .sous-titre { font-size:12px; color:#7A6A5F; font-style:italic; margin:6px 0 0; }
  .liste { padding:1rem; display:flex; flex-direction:column; gap:10px; }
  .carte { background:#fff; border:1px solid #E7DCC8; border-radius:4px; padding:10px; display:flex; flex-direction:row-reverse; align-items:center; gap:10px; }
  .image { width:64px; height:64px; flex-shrink:0; border-radius:4px; }
  .texte { flex:1; min-width:0; }
  .nom { font-size:13.5px; font-weight:500; color:#2B1B17; }
  .description { font-size:11.5px; color:#7A6A5F; }
  .pellicule { position:relative; background:#000; overflow:hidden; }
  .pellicule .degrade { position:absolute; inset:0; background:linear-gradient(90deg,#7F77DD,#1D9E75,#D85A30); }
  .perforation-haut, .perforation-bas { position:absolute; left:0; right:0; height:6px; background-image:radial-gradient(circle,#FBF4E8 1.5px,transparent 1.5px); background-size:7px 100%; }
  .perforation-haut { top:0; } .perforation-bas { bottom:0; }
</style>
</head>
<body>
  <div class="telephone">
    <div class="entete">
      <p class="date">21 juin 2026</p>
      <p class="titre80">80</p>
      <p class="sous-titre">ans de souvenirs, une fête, cinq trésors à garder</p>
    </div>
    <div class="liste">
      <div class="carte">
        <div class="image pellicule"><div class="degrade"></div><div class="perforation-haut"></div><div class="perforation-bas"></div></div>
        <div class="texte"><div class="nom">Frise chronologique</div><div class="description">80 années, une ligne de vie</div></div>
      </div>
      <div class="carte">
        <div class="image" style="background:#888780;"></div>
        <div class="texte"><div class="nom">L'Arbre Généalogique</div><div class="description">Toutes les racines de la famille</div></div>
      </div>
      <div class="carte">
        <div class="image" style="background:#D85A30;"></div>
        <div class="texte"><div class="nom">La Gazette de Parmilieu</div><div class="description">Le mot qui ouvre la fête</div></div>
      </div>
    </div>
  </div>
</body>
</html>
