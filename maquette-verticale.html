<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Maquette — disposition verticale (retenue)</title>
<style>
  body { background:#f5f5f3; font-family: sans-serif; padding:2rem; display:flex; justify-content:center; }
  .telephone { width:280px; height:560px; background:#FBF4E8; border-radius:18px; overflow:hidden; border:1px solid #e0ddd5; position:relative; }
  .entete { text-align:center; padding:14px 10px 10px; border-bottom:1px solid #E7DCC8; }
  .date { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#8C2F39; font-weight:500; margin:0 0 4px; }
  .titre80 { font-size:30px; font-weight:500; color:#2B1B17; line-height:0.9; margin:0; }
  .carte { position:absolute; left:10px; right:10px; height:412px; background:#fff; border:1px solid #E7DCC8; border-radius:6px; padding:12px; display:flex; flex-direction:column; gap:6px; }
  .nom { font-size:15px; font-weight:500; color:#2B1B17; }
  .description { font-size:11.5px; color:#7A6A5F; margin-bottom:4px; }
  .cadre-image { flex:1; border-radius:4px; position:relative; overflow:hidden; }
  .pellicule { background:#000; }
  .pellicule .degrade { position:absolute; inset:10px 0; background:linear-gradient(90deg,#7F77DD,#1D9E75,#D85A30,#D4537E); }
  .perforation-haut, .perforation-bas { position:absolute; left:0; right:0; height:9px; background-image:radial-gradient(circle,#FBF4E8 2px,transparent 2px); background-size:11px 100%; }
  .perforation-haut { top:0; } .perforation-bas { bottom:0; }
</style>
</head>
<body>
  <div class="telephone">
    <div class="entete">
      <p class="date">21 juin 2026</p>
      <p class="titre80">80</p>
    </div>

    <div class="carte" style="top:78px;">
      <div class="nom">Frise chronologique</div>
      <div class="description">80 années, une ligne de vie</div>
      <div class="cadre-image pellicule">
        <div class="degrade"></div>
        <div class="perforation-haut"></div>
        <div class="perforation-bas"></div>
      </div>
    </div>

    <div class="carte" style="top:500px;">
      <div class="nom">L'Arbre Généalogique</div>
      <div class="description">Toutes les racines de la famille</div>
      <div class="cadre-image" style="background:#888780;"></div>
    </div>
  </div>
</body>
</html>
